project:
  name: "RAI-GeoAI"
  seed_list: [42, 123, 256, 512, 1024]

data:
  crs: "EPSG:32630"
  spatial_resolution_m: 10
  tau_satellite: 0.50
  tau_static: 0.70
  pca_variance_threshold: 0.999

fairness:
  k_anonymity_grid_m: 50
  k_min: 5
  target_class_balance: 0.25
  zpr_threshold: 0.10
  seod_target: 0.05

privacy:
  epsilon: 5.0
  delta: 1.0e-5
  max_grad_norm: 1.0
  noise_multiplier: 1.1
  mia_auc_threshold: 0.55

cgan:
  latent_dim: 128
  generator_hidden: [256, 512, 256]
  discriminator_hidden: [256, 512, 256]
  leaky_relu_alpha: 0.2
  dropout_rate: 0.3
  learning_rate: 2.0e-4
  beta1: 0.5
  beta2: 0.999
  batch_size: 256
  max_epochs: 1000
  early_stop_window: 10
  early_stop_threshold: 0.005
  lambda_seod: 0.1

validation:
  tstr_splits: 5
  classifier_n_estimators: 500
  classifier_max_depth: 20
  sfid_reference: "real"

feedback:
  max_iterations: 10
  convergence_threshold: 0.005
  cosine_eta_min: 0.001
  cosine_eta_max: 0.1

explainability:
  gwfa_kernel: "gaussian"
  gwfa_adaptive: true
  csd_target_adjacent: true
  ad_threshold: 0.05

output:
  results_dir: "results"
  models_dir: "models"
  docs_dir: "accountability_docs"
  figures_dir: "figures"
